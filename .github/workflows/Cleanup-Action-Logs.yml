name: Cleanup Action Logs

on:
  schedule:
    - cron: '0 16 * * *'
  workflow_dispatch: 

permissions:
  actions: write
  contents: read

jobs:
  delete-runs:
    runs-on: ubuntu-latest
    steps:
      - name: Delete workflow runs
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "正在搜索并清理语法报错 (Invalid Workflow) 的日志..."
          invalid_runs=$(gh api "repos/${{ github.repository }}/actions/runs?per_page=100" \
            --jq '.workflow_runs[] | select(.status == "startup_failure") | .id')
          
          for run_id in $invalid_runs; do
            run_name=$(gh api "repos/${{ github.repository }}/actions/runs/$run_id" --jq '.name')
            echo "正在删除语法报错记录: $run_name (ID: $run_id)"
            gh api -X DELETE "repos/${{ github.repository }}/actions/runs/$run_id" --silent
          done

          echo "正在获取所有有效 Workflow 列表..."
          workflows=$(gh api repos/${{ github.repository }}/actions/workflows | jq -r '.workflows[].id')

          for workflow_id in $workflows; do
            echo "正在清理 Workflow ID: $workflow_id"
            run_ids=$(gh api "repos/${{ github.repository }}/actions/workflows/$workflow_id/runs?per_page=100" \
              | jq -r '.workflow_runs[] | select(.status != "in_progress") | .id')

            for run_id in $run_ids; do
              run_name=$(gh api "repos/${{ github.repository }}/actions/runs/$run_id" --jq '.name')
              echo "正在删除运行记录: $run_name (ID: $run_id)"
              gh api -X DELETE "repos/${{ github.repository }}/actions/runs/$run_id" --silent
            done
          done
          
          echo "清理完成！"
