name: Cleanup Old Releases

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  cleanup-releases:
    runs-on: ubuntu-latest
    steps:
      - name: Cleanup releases in public repo
        uses: actions/github-script@v7
        with:
          script: |
            const owner = 'sora-shao';
            const repo = 'openwrt-private-ci';
            const maxReleases = 10;
            
            console.log(`🔍 开始清理公开仓库: ${owner}/${repo}`);
            
            // 获取所有release
            const releases = await github.rest.repos.listReleases({
              owner,
              repo,
              per_page: 100
            });
            
            // 筛选出由github-actions[bot]发布的release
            const actionBotReleases = releases.data
              .filter(release => release.author.login === 'github-actions[bot]')
              .sort((a, b) => new Date(b.published_at) - new Date(a.published_at));
            
            console.log(`📊 找到 ${actionBotReleases.length} 个github-actions[bot]发布的release`);
            
            // 如果超过10个，删除最早的
            if (actionBotReleases.length > maxReleases) {
              const releasesToDelete = actionBotReleases.slice(maxReleases);
              console.log(`🗑️  需要删除 ${releasesToDelete.length} 个release`);
              
              for (const release of releasesToDelete) {
                try {
                  console.log(`⏳ 正在删除: ${release.tag_name}`);
                  
                  // 删除release
                  await github.rest.repos.deleteRelease({
                    owner,
                    repo,
                    release_id: release.id
                  });
                  
                  // 删除tag
                  await github.rest.git.deleteRef({
                    owner,
                    repo,
                    ref: `tags/${release.tag_name}`
                  });
                  
                  console.log(`✅ 成功删除: ${release.tag_name}`);
                } catch (error) {
                  console.log(`❌ 删除失败 ${release.tag_name}: ${error.message}`);
                }
              }
            } else {
              console.log(`✨ 当前release数量 (${actionBotReleases.length}) 不超过限制 (${maxReleases})`);
            }

      - name: Cleanup releases in private repo
        uses: actions/github-script@v7
        with:
          script: |
            const owner = 'sora-shao';
            const repo = 'openwrt-private';
            const maxReleases = 10;
            const privateToken = '${{ secrets.MY_PRIVATE_REPO_TOKEN }}';
            
            console.log(`🔍 开始清理私人仓库: ${owner}/${repo}`);
            
            // 使用私人token创建privateOctokit实例
            const { Octokit } = await import("@octokit/rest");
            const privateOctokit = new Octokit({ auth: privateToken });
            
            // 获取所有release
            const releases = await privateOctokit.rest.repos.listReleases({
              owner,
              repo,
              per_page: 100
            });
            
            // 筛选出由github-actions[bot]发布的release（排除sora-shao用户的release）
            const actionBotReleases = releases.data
              .filter(release => release.author.login === 'github-actions[bot]')
              .sort((a, b) => new Date(b.published_at) - new Date(a.published_at));
            
            console.log(`📊 找到 ${actionBotReleases.length} 个github-actions[bot]发布的release`);
            
            // 如果超过10个，删除最早的
            if (actionBotReleases.length > maxReleases) {
              const releasesToDelete = actionBotReleases.slice(maxReleases);
              console.log(`🗑️  需要删除 ${releasesToDelete.length} 个release`);
              
              for (const release of releasesToDelete) {
                try {
                  console.log(`⏳ 正在删除: ${release.tag_name}`);
                  
                  // 删除release
                  await privateOctokit.rest.repos.deleteRelease({
                    owner,
                    repo,
                    release_id: release.id
                  });
                  
                  // 删除tag
                  await privateOctokit.rest.git.deleteRef({
                    owner,
                    repo,
                    ref: `tags/${release.tag_name}`
                  });
                  
                  console.log(`✅ 成功删除: ${release.tag_name}`);
                } catch (error) {
                  console.log(`❌ 删除失败 ${release.tag_name}: ${error.message}`);
                }
              }
            } else {
              console.log(`✨ 当前release数量 (${actionBotReleases.length}) 不超过限制 (${maxReleases})`);
            }

      - name: Summary
        if: always()
        run: |
          echo "✅ Release清理任务完成！"
          echo "📋 清理规则："
          echo "  • 公开仓库: 保留最新10个github-actions[bot]发布的release"
          echo "  • 私人仓库: 保留最新10个github-actions[bot]发布的release (排除sora-shao用户的release)"