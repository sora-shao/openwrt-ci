# This workflow is triggered by a cron schedule

name: Auto Trigger

on:
  schedule:
    - cron: '0 16,20,0,4,8,12 * * *'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v2
      - name: Run some commands
        run: echo 'Running on schedule!'