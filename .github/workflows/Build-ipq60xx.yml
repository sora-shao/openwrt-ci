name: Build-ipq60xx

on:
  workflow_dispatch:
    inputs:
      repo_url:
        description: '🌐 OpenWrt 源码地址'
        required: true
        default: 'https://github.com/openwrt/openwrt'
      repo_branch:
        description: '🌿 源码分支'
        required: true
        default: 'main'
      use_cache:
        description: '💾 使用编译缓存 (提升速度)'
        required: false
        type: boolean
        default: false
      build_parallel:
        description: '🚀 开启并行编译 (同时跑两个设备)'
        required: false
        type: boolean
        default: false
      single_device:
        description: '📱 单一目标设备 (不并行时生效)'
        required: true
        default: 'nn6000-v2'
        type: choice
        options:
          - 'nn6000-v2'
          - 're-ss-01'
      extra_plugins:
        description: '🧩 额外插件 (空格分隔)'
        required: false
        default: ''
      luci_version:
        description: 'immortal-luci-version'
        required: false
        default: ''

env:
  TZ: Asia/Shanghai

permissions:
  contents: write
  actions: write 

jobs:
  # 1. 预处理
  setup:
    runs-on: ubuntu-latest
    outputs:
      devices: ${{ steps.set-matrix.outputs.devices }}
      source_key: ${{ steps.set-matrix.outputs.source_key }}
      repo_name: ${{ steps.set-matrix.outputs.repo_name }}
    steps:
      - id: set-matrix
        run: |
          # 提取源码仓库名
          REPO_NAME=$(echo "${{ github.event.inputs.repo_url }}" | sed 's|.*/||' | sed 's|\.git$||')
          echo "repo_name=$REPO_NAME" >> $GITHUB_OUTPUT
          
          # 生成源码唯一标识 (URL + Branch 的 MD5)
          SRC_HASH=$(echo -n "${{ github.event.inputs.repo_url }}-${{ github.event.inputs.repo_branch }}" | md5sum | cut -d' ' -f1)
          echo "source_key=$SRC_HASH" >> $GITHUB_OUTPUT
          
          if [ "${{ github.event.inputs.build_parallel }}" = "true" ]; then
            echo 'devices=["nn6000-v2", "re-ss-01"]' >> $GITHUB_OUTPUT
          else
            echo 'devices=["${{ github.event.inputs.single_device }}"]' >> $GITHUB_OUTPUT
          fi

  # 2. 编译作业
  build:
    needs: setup
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        device: ${{ fromJson(needs.setup.outputs.devices) }}

    steps:
    - name: Checkout Public Source
      run: |
        REPO_URL="${{ github.event.inputs.repo_url }}"
        REPO_BRANCH="${{ github.event.inputs.repo_branch }}"
        if [[ "$REPO_URL" == *"sora-shao"* ]]; then
          AUTH_URL=$(echo "$REPO_URL" | sed "s|https://github.com/|https://sora-shao:${{ secrets.MY_PRIVATE_REPO_TOKEN }}@github.com/|g")
          git clone --depth 1 -b "$REPO_BRANCH" "$AUTH_URL" openwrt
        else
          git clone --depth 1 -b "$REPO_BRANCH" "$REPO_URL" openwrt
        fi

    - name: Checkout Private Tools
      if: "!contains(github.event.inputs.repo_url, 'sora-shao')"
      uses: actions/checkout@v4
      with:
        repository: sora-shao/openwrt-private
        token: ${{ secrets.MY_PRIVATE_REPO_TOKEN }}
        ref: tools
        path: my_openwrt_custom
        
    - name: Free Disk Space (Cleanup)
      run: |
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
        sudo docker image prune -a -f
        sudo apt-get -y purge azure-cli* docker* ghc* zulu* llvm* firefox google* dotnet* powershell* openjdk* mysql* php*
        sudo apt-get -y autoremove --purge
        sudo apt-get clean

    - name: Initialization environment
      run: |
        sudo -E apt-get -qq update
        sudo bash -c 'bash <(curl -s https://build-scripts.immortalwrt.org/init_build_environment.sh)'|| echo '1'
        sudo -E apt-get -qq install build-essential clang flex bison g++ gawk gcc-multilib g++-multilib \
        gettext git libncurses5-dev libssl-dev python3-setuptools swig zlib1g-dev libelf-dev \
        unzip zlib1g-dev file python3 python3-pip rsync subversion wget bzip2 patch \
        libncursesw5-dev libsqlite3-dev libxml2-dev libxslt1-dev zlib1g-dev libffi-dev \
        libc6-dev-i386 lib32z1-dev lib32ncurses-dev lib32stdc++6 \
        antlr3 gperf genisoimage p7zip p7zip-full rename qemu-utils rsync proxychains-ng
        sudo timedatectl set-timezone "$TZ"

    - name: Show Build Info
      run: |
        echo "========================================================="
        echo "🚀 编译信息确认"
        echo "========================================================="
        echo "🌐 源码地址: ${{ github.event.inputs.repo_url }}"
        echo "📦 源码仓库: ${{ needs.setup.outputs.repo_name }}"
        echo "🌿 源码分支: ${{ github.event.inputs.repo_branch }}"
        echo "📱 目标机型: ${{ matrix.device }}"
        echo "🧩 额外插件: ${{ github.event.inputs.extra_plugins || '无' }}"
        echo "💾 开启缓存: ${{ github.event.inputs.use_cache }}"
        echo "========================================================="

    - name: Cache Tools & DL
      if: github.event.inputs.use_cache == 'true'
      uses: actions/cache@v4
      with:
        path: |
          openwrt/staging_dir
          openwrt/toolchain
        key: ${{ runner.os }}-openwrt-${{ matrix.device }}-${{ needs.setup.outputs.source_key }}-${{ github.run_id }}
        restore-keys: |
          ${{ runner.os }}-openwrt-${{ matrix.device }}-${{ needs.setup.outputs.source_key }}-

    - name: Run Sync Script & Load Config
      run: |
        if [ -d "my_openwrt_custom" ]; then
          chmod +x my_openwrt_custom/sync.sh
          ./my_openwrt_custom/sync.sh "$GITHUB_WORKSPACE/openwrt"
        else
          cp "openwrt/.config-${{ matrix.device }}" "openwrt/.config" || true
        fi

    - name: Update & Install Feeds
      run: |
        cd openwrt
        ./scripts/feeds update -a
        if [[ ! "${{ github.event.inputs.repo_url }}" == *"immortalwrt"* ]]; then
          rm -rf feeds/luci/modules/luci-mod-status
          [ -f "init.sh" ] && bash init.sh "${{ github.event.inputs.luci_version }}" || echo "Skip init.sh"
          wc -l feeds/luci/modules/luci-base/root/usr/share/rpcd/ucode/luci
        fi
        ./scripts/feeds install -a

    - name: Load Device Config
      run: |
        cd openwrt
        if [ -f ".config-${{ matrix.device }}" ]; then
          cp ".config-${{ matrix.device }}" .config
          echo "✅ 已成功加载 ${{ matrix.device }} 的种子配置 (.config-${{ matrix.device }})"
        else
          echo "❌ 错误: .config-${{ matrix.device }} 不存在！"
          exit 1
        fi
        PLUGINS="${{ github.event.inputs.extra_plugins }}"
        if [ -n "$PLUGINS" ]; then
          echo "🔧 发现额外插件请求: $PLUGINS"
          for plugin in $PLUGINS; do
            echo "CONFIG_PACKAGE_$plugin=y" >> .config
          done
          make defconfig
        else
          make defconfig
        fi
        
        chmod +x package/base-files/files/etc/uci-defaults/*
        
        echo "--------------------------------------------------------"
        echo "统计: 当前配置中 kmod 编译(y)数量: $(grep 'kmod' .config | grep '=y' | wc -l) 编译(m)数量: $(grep 'kmod' .config | grep '=m' | wc -l)"
        echo "--------------------------------------------------------"
        grep luci .config |grep =y

    - name: Download package
      run: |
        cd openwrt
        make download -j16
        find dl -size -1024c -exec rm -f {} \;

    - name: Compile the firmware
      run: |
        cd openwrt
        make -j$(($(nproc) + 1)) || make -j1 V=s

    - name: Process Artifacts
      id: organize
      if: success()
      run: |
        mkdir -p ./output/local_only
        mkdir -p ./output/private_all
        
        PKG_FILE="packages-${{ matrix.device }}.tgz"
        tar -zcvf "./output/$PKG_FILE" -C openwrt/bin/targets/qualcommax/ipq60xx/ packages/
        cp "./output/$PKG_FILE" ./output/local_only/
        cp "./output/$PKG_FILE" ./output/private_all/
        
        find openwrt/bin/targets/qualcommax/ipq60xx/ -type f \( -name "*factory*" -o -name "*sysupgrade*" \) -exec cp {} ./output/private_all/ \;
        
        TAG_NAME="${{ needs.setup.outputs.repo_name }}-${{ github.event.inputs.repo_branch }}-${{ matrix.device }}-$(date +'%Y-%m-%d-%H%M')"
        echo "release_name=$TAG_NAME" >> $GITHUB_OUTPUT
        echo "status=success" >> $GITHUB_OUTPUT

    - name: Upload to Local Repo (Packages Only)
      uses: softprops/action-gh-release@v2
      if: steps.organize.outputs.status == 'success'
      with:
        tag_name: ${{ steps.organize.outputs.release_name }}
        name: ${{ steps.organize.outputs.release_name }}
        files: ./output/local_only/*
        body: |
          🌐 源码地址: ${{ github.event.inputs.repo_url }}
          📦 源码仓库: ${{ needs.setup.outputs.repo_name }}
          🌿 源码分支: ${{ github.event.inputs.repo_branch }}
          📱 目标机型: ${{ matrix.device }}
          🧩 额外插件: ${{ github.event.inputs.extra_plugins || '无' }}
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Upload to openwrt-private (Firmware + Packages)
      uses: softprops/action-gh-release@v2
      if: steps.organize.outputs.status == 'success'
      with:
        repository: sora-shao/openwrt-private
        token: ${{ secrets.MY_PRIVATE_REPO_TOKEN }}
        tag_name: ${{ steps.organize.outputs.release_name }}
        name: ${{ steps.organize.outputs.release_name }}
        files: ./output/private_all/*
        body: |
          🌐 源码地址: ${{ github.event.inputs.repo_url }}
          📦 源码仓库: ${{ needs.setup.outputs.repo_name }}
          🌿 源码分支: ${{ github.event.inputs.repo_branch }}
          📱 目标机型: ${{ matrix.device }}
          🧩 额外插件: ${{ github.event.inputs.extra_plugins || '无' }}
        prerelease: false

    - name: Delete Old Cache
      if: success() && github.event.inputs.use_cache == 'true'
      run: |
        echo "🧹 清理旧缓存 (Source: ${{ needs.setup.outputs.source_key }})"
        gh cache list --limit 100 --ref ${{ github.ref }} --key "${{ runner.os }}-openwrt-${{ matrix.device }}-${{ needs.setup.outputs.source_key }}-" | cut -f 1 | xargs -I {} gh cache delete {} || true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Delete Old Releases
      uses: dev-drprasad/delete-older-releases@v0.3.0
      with:
        keep_latest: 10
        delete_tags: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
