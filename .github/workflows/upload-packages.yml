name: Update Package (Smart Sync)

on:
  workflow_dispatch:
    inputs:
      release_name:
        description: '🏷️ 输入要下载的 Release 名称 (Tag)'
        required: true
        default: ''
      target_repo:
        description: '🌐 目标上传仓库地址'
        required: true
        default: 'https://github.com/sora-shao/openwrt-kmods'

env:
  TZ: Asia/Shanghai

jobs:
  update-process:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Current Repo
        uses: actions/checkout@v4

      - name: Download Package from Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RELEASE_TAG="${{ github.event.inputs.release_name }}"
          ASSET_NAME=$(gh release view "$RELEASE_TAG" --json assets -q '.assets[] | select(.name | contains("package")) | select(.name | endswith(".tgz")) | .name' | head -n 1)
          
          if [ -z "$ASSET_NAME" ]; then
            echo "❌ 错误: 在 Release [$RELEASE_TAG] 中未找到 package 压缩包"
            exit 1
          fi
          
          echo "📥 正在下载资产: $ASSET_NAME"
          gh release download "$RELEASE_TAG" -p "$ASSET_NAME"
          
          mkdir -p raw_packages
          tar -zxf "$ASSET_NAME" -C raw_packages
          
          mkdir -p final_content
          if [ -d "raw_packages/packages" ]; then
            cp -rf raw_packages/packages/* final_content/
          else
            cp -rf raw_packages/* final_content/
          fi

      - name: Smart Git Sync
        env:
          MY_TOKEN: ${{ secrets.MY_PRIVATE_REPO_TOKEN }}
        run: |
          # 1. 设置全局身份信息（核心修复：放在最前面）
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global init.defaultBranch main

          TARGET_URL="${{ github.event.inputs.target_repo }}"
          AUTH_URL=$(echo "$TARGET_URL" | sed "s|https://|https://sora-shao:${MY_TOKEN}@|")
          
          # 2. 检测远程仓库状态
          IS_EMPTY=$(git ls-remote "$AUTH_URL" | wc -l)
          
          if [ "$IS_EMPTY" -eq 0 ]; then
            echo "⚠️ 目标仓库为空，执行初始化推送..."
            mkdir -p init_repo
            cp -rf final_content/* init_repo/
            cd init_repo
            git init
            git remote add origin "$AUTH_URL"
            git add .
            git commit -m "Initial packages from ${{ github.event.inputs.release_name }}"
            git branch -M main
            git push -u origin main
          else
            echo "✅ 目标仓库已有内容，执行同步更新..."
            # 确保在根目录操作 clone
            cd $GITHUB_WORKSPACE
            git clone "$AUTH_URL" sync_repo
            cd sync_repo
            
            # 清理并同步内容
            find . -maxdepth 1 ! -name ".git" ! -name "." -exec rm -rf {} +
            cp -rf ../final_content/* ./
            
            git add .
            if git diff --staged --quiet; then
              echo "☕ 文件内容无变化，跳过 Push。"
            else
              git commit -m "Update packages from ${{ github.event.inputs.release_name }}"
              git push origin main
            fi
          fi
