name: Cleanup Old Releases

on:
  release:
    types: [published] 
  schedule:
    - cron: '0 20 * * *' 
  workflow_dispatch:   
    inputs:
      keep_minimum:
        description: '🔢 运行后保留的 Release 数量'
        required: false
        default: '10'
      dry_run:
        description: '🔍 仅预览（不执行实际删除）'
        required: false
        type: boolean
        default: false

jobs:
  cleanup:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        repo_type: ['local', 'private'] 
    
    steps:
      - name: Set Repository Context
        id: info
        run: |
          if [ "${{ matrix.repo_type }}" = "local" ]; then
            echo "target_repo=${{ github.repository }}" >> $GITHUB_OUTPUT
            echo "target_token=${{ secrets.GITHUB_TOKEN }}" >> $GITHUB_OUTPUT
          else
            echo "target_repo=asuka6250/openwrt-private" >> $GITHUB_OUTPUT
            echo "target_token=${{ secrets.MY_PRIVATE_REPO_TOKEN }}" >> $GITHUB_OUTPUT
          fi

      - name: List and Cleanup
        env:
          GH_TOKEN: ${{ steps.info.outputs.target_token }}
          REPO: ${{ steps.info.outputs.target_repo }}
          DRY_RUN: ${{ github.event.inputs.dry_run }}
          # 获取用户输入，如果为空（定时任务触发）则默认为 10
          USER_KEEP: ${{ github.event.inputs.keep_minimum || '10' }}
        run: |
          echo "========================================================="
          echo "📂 正在检查仓库: $REPO"
          
          # --- 数值校验逻辑 ---
          # 使用正则判断是否为纯数字，如果不是则强制设为 10
          if [[ "$USER_KEEP" =~ ^[0-9]+$ ]]; then
            KEEP_COUNT=$USER_KEEP
          else
            echo "⚠️ 输入的 '$USER_KEEP' 不是有效数字，将使用默认值 10"
            KEEP_COUNT=10
          fi
          echo "📌 设定保留数量为: $KEEP_COUNT"
          echo "========================================================="

          # 1. 获取并按日期排序匹配的 Release
          ALL_MATCHED_RELEASES=$(gh api repos/$REPO/releases --paginate \
            --jq '.[] | select(.tag_name | test(".*-[0-9]{4}-[0-9]{2}-[0-9]{2}-[0-9]{4}$")) 
            | {
                tag: .tag_name, 
                id: .id, 
                date_part: (.tag_name | capture("(?<d>[0-9]{4}-[0-9]{2}-[0-9]{2}-[0-9]{4})$") | .d)
              }' \
            | jq -s 'sort_by(.date_part)')

          TOTAL_FOUND=$(echo "$ALL_MATCHED_RELEASES" | jq 'length')

          echo "📋 符合规则的 Release 列表 (按末尾日期从早到晚):"
          echo "--------------------------------------------------------"
          if [ "$TOTAL_FOUND" -eq 0 ]; then
            echo "(未发现匹配规则的 Release)"
          else
            echo "$ALL_MATCHED_RELEASES" | jq -r '.[] | "[\(.tag)]"'
          fi
          echo "--------------------------------------------------------"
          echo "统计: 共计 $TOTAL_FOUND 个"

          # 2. 清理逻辑
          if [ "$TOTAL_FOUND" -le "$KEEP_COUNT" ]; then
            echo "✅ 数量为 $TOTAL_FOUND，未超过保留阈值 $KEEP_COUNT，无需清理。"
          else
            DELETE_LIMIT=$((TOTAL_FOUND - KEEP_COUNT))
            echo "⚠️ 触发清理：准备删除最早的 $DELETE_LIMIT 个..."
            
            # 提取排序后最老（数组最前面）的 N 个
            TO_DELETE=$(echo "$ALL_MATCHED_RELEASES" | jq -c ".[0:$DELETE_LIMIT] | .[]")

            echo "$TO_DELETE" | while read -r row; do
              TAG=$(echo "$row" | jq -r '.tag')
              ID=$(echo "$row" | jq -r '.id')
              
              if [ "$DRY_RUN" = "true" ]; then
                echo " [预览] 计划删除: $TAG"
              else
                echo " 🚀 正在删除: $TAG"
                # 同时删除 Release 记录和 Git Tag
                gh api -X DELETE "repos/$REPO/releases/$ID" --silent
                gh api -X DELETE "repos/$REPO/git/refs/tags/$TAG" --silent || echo "  (Tag 已清理)"
              fi
            done
            echo "✨ $REPO 清理任务完成。"
          fi
